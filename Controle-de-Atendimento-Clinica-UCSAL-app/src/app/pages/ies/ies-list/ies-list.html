<p-confirmDialog></p-confirmDialog>

<p-card header="IES">
  <div class="table-header">
    <button
      pButton
      label="Nova IES"
      icon="pi pi-plus"
      [routerLink]="['/main-layout/ies/create']"
    ></button>
  </div>

  <p-table [value]="ies" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Sigla</th>
        <th>Acoes</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-i>
      <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.sigla }}</td>
        <td>

          <button
            pButton
            icon="pi pi-trash"
            class="p-button-text p-button-danger"
            (click)="deleteIes(i.id)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
