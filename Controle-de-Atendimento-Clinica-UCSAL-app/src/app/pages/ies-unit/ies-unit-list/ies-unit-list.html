<p-card header="Unidades">
  <div class="actions">
    <p-button
      label="Nova Unidade"
      icon="pi pi-plus"
      [routerLink]="['/main-layout/ies-units/create']"
    ></p-button>
  </div>

  <p-table [value]="(units | async) ?? []" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Representante</th>
        <th>IES</th>
        <th>Status</th>
        <th>Acoes</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-u>
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.representante?.nome }}</td>
        <td>{{ u.ies?.nome }}</td>
        <td>
          <p-tag
            [value]="u.status"
            [severity]="u.status === 'ATIVO' ? 'success' : 'danger'"
          ></p-tag>
        </td>
        <td class="actions-column">
          <button
            pButton
            [icon]="u.status === 'Ativo' ? 'pi pi-eye-slash' : 'pi pi-eye'"
            class="p-button-text"
            (click)="toggleStatus(u.id)"
          ></button>
          <!-- <button
            pButton
            icon="pi pi-trash"
            class="p-button-text p-button-danger"
            (click)="deleteSchool(s.id)"
          ></button> -->
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
