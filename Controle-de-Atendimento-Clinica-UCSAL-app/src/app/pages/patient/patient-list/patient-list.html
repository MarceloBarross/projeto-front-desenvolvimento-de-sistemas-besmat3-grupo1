<p-confirmDialog></p-confirmDialog>

<p-card header="Pacientes">

  <div class="table-header">
    <button
      pButton
      label="Novo Paciente"
      icon="pi pi-plus"
      [routerLink]="['/main-layout/patients/create']"
    ></button>
  </div>

  <p-table [value]="patients" responsiveLayout="scroll">

    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Celular (WhatsApp)</th>
        <th>Email</th>
        <th>Data de Cadastramento</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-p>
      <tr>
        <td>{{ p.nome }}</td>
        <td>{{ p.categoria }}</td>
        <td>{{ p.celular }}</td>
        <td>{{ p.email }}</td>
        <td>{{ p.dataCadastramento | date: 'dd/MM/yyyy' }}</td>
        <td>{{ p.status }}</td>
        <td>
          <button
            pButton
            icon="pi pi-file-edit"
            class="p-button-text p-button-info"
            pTooltip="Prontuários"
            (click)="abrirProntuarios(p.id)"
          ></button>
          <button
            pButton
            icon="pi pi-comments"
            class="p-button-text"
            pTooltip="Motivo de Restrição"
            (click)="abrirDialogMotivo(p)"
          ></button>
          <button
            pButton
            [icon]="p.status === 'ATIVO' ? 'pi pi-lock-open' : 'pi pi-lock'"
            [class]="p.status === 'ATIVO' ? 'p-button-text p-button-warning' : 'p-button-text p-button-secondary'"
            [disabled]="p.status === 'ATIVO' && !p.motivoRestricao"
            [pTooltip]="p.status === 'ATIVO' && !p.motivoRestricao ? 'Adicione um motivo para desativar' : (p.status === 'ATIVO' ? 'Desativar' : 'Ativar')"
            (click)="alterarStatus(p.id, p.status, p.motivoRestricao)"
          ></button>
        </td>
      </tr>
    </ng-template>

  </p-table>

</p-card>

<!-- DIALOG MOTIVO -->
<p-dialog
  [header]="'Motivo de Restrição — ' + (pacienteSelecionado?.nome ?? '')"
  [(visible)]="motivoDialogVisible"
  [modal]="true"
  [style]="{ width: '35rem' }"
>
  <div class="field">
    <label for="motivo">Motivo de Restrição</label>
    <textarea 
      id="motivo" 
      [(ngModel)]="motivoRestricio" 
      rows="4" 
      class="w-full p-2 border border-gray-300 rounded"
      placeholder="Digite o motivo da restrição..."
    ></textarea>
  </div>

  <ng-template pTemplate="footer">
    <button 
      pButton 
      label="Cancelar" 
      icon="pi pi-times" 
      (click)="motivoDialogVisible = false"
      class="p-button-secondary"
    ></button>
    <button 
      pButton 
      label="Salvar" 
      icon="pi pi-check" 
      (click)="salvarMotivo()"
      [disabled]="!motivoRestricio?.trim()"
    ></button>
  </ng-template>
</p-dialog>
