<p-card header="Solicitacoes de Medicamentos">
  <div class="actions">
    <p-button
      label="Nova Solicitacao"
      icon="pi pi-plus"
      [routerLink]="['/main-layout/medication-requests/create']"
    ></p-button>
  </div>

  <p-table [value]="requests" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>ID da Solicitacao</th>
        <th>ID da Medicacao</th>
        <th>Nome do Medicamento</th>
        <th>Carater</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-r>
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.medicationId }}</td>
        <td>{{ r.medicationName }}</td>
        <td>
          <p-tag [value]="r.requestPriority" [severity]="getPrioritySeverity(r.requestPriority)"></p-tag>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
