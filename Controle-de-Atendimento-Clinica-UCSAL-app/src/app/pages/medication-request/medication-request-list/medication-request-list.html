<p-card header="Solicitacoes de Medicamentos">
  <div class="actions">
    @if (role == 'PROFISSIONAL') {
      <p-button
        label="Nova Solicitacao"
        icon="pi pi-plus"
        [routerLink]="['/main-layout/medication-requests/create']"
      ></p-button>
    }
  </div>

  <p-table [value]="requests" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>ID da Solicitacao</th>
        <th>ID da Medicacao</th>
        <th>Nome do Medicamento</th>
        <th>Profissional</th>
        <th>Carater</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-r>
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.medicacaoId }}</td>
        <td>{{ r.nomeMedicacao }}</td>
        <td>{{ r.nomeProfissional }}</td>
        <td>
          <p-tag [value]="r.caraterSolicitacao" [severity]="getPrioritySeverity(r.caraterSolicitacao)"></p-tag>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
