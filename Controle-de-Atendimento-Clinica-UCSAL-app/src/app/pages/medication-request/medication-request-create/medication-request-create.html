<p-card header="Nova Solicitação de Medicamento">
  <form [formGroup]="requestForm" class="form">
    <div class="field">
      <label for="medicacaoId">Medicação *</label>
      <p-floatLabel>
        <select 
          id="medicacaoId" 
          formControlName="medicacaoId" 
          class="select-input"
          (change)="onMedicationChange($event)"
        >
          <option value="">Selecione uma medicação</option>
          @for (medication of medications; track medication.id) {
            <option [value]="medication.id">{{ medication.id }} - {{ medication.nome }}</option>
          }
        </select>
        <label for="medicacaoId">Medicação</label>
      </p-floatLabel>

      @if (requestForm.controls.medicacaoId.invalid && requestForm.controls.medicacaoId.touched) {
        <small class="p-error">Selecione uma medicação válida.</small>
      }
    </div>

    <div class="field">
      <p-floatLabel>
        <input 
          pInputText 
          id="medicationName" 
          [value]="selectedMedicationName"
          readonly 
        />
        <label for="medicationName">Nome do Medicamento</label>
      </p-floatLabel>
    </div>

    <div class="field">
      <label for="caraterSolicitacao">Caráter da Solicitação *</label>
      <p-floatLabel>
        <select id="caraterSolicitacao" formControlName="caraterSolicitacao" class="select-input">
          @for (prioridade of prioridades; track prioridade.value) {
            <option [value]="prioridade.value">{{ prioridade.label }}</option>
          }
        </select>
        <label for="caraterSolicitacao">Caráter</label>
      </p-floatLabel>

      @if (requestForm.controls.caraterSolicitacao.invalid && requestForm.controls.caraterSolicitacao.touched) {
        <small class="p-error">Selecione um caráter válido.</small>
      }
    </div>

    @if (errMessage) {
      <p-message severity="error" [text]="errMessage"></p-message>
    }

    <div class="buttons">
      <p-button label="Salvar" icon="pi pi-check" (click)="save()"></p-button>
      <p-button severity="danger" label="Cancelar" icon="pi pi-times" (click)="cancel()"></p-button>
    </div>
  </form>
</p-card>
