<p-confirmDialog></p-confirmDialog>

<p-card header="Profissionais">
  <div class="table-header">
    <button
      pButton
      label="Novo Profissional"
      icon="pi pi-plus"
      [routerLink]="['/main-layout', 'profissionals', 'create']"
    ></button>
  </div>

  <p-table [value]="profissionals" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Especialidade</th>
        <th>Conselho</th>
        <th>Telefone</th>
        <th>Email</th>
        <th>Acoes</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-p>
      <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.specialty }}</td>
        <td>{{ p.council }}</td>
        <td>{{ p.phone }}</td>
        <td>{{ p.email }}</td>
        <td>
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-text"
            (click)="editarProfissional(p.id)"
          ></button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-text p-button-danger"
            (click)="deleteProfissional(p.id)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
